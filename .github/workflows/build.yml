name: Build Kernel with SukiSU Ultra
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc clang-14 lld-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi flex bison libssl-dev bc rsync

    - name: Clone SukiSU Ultra
      run: |
        git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra -b main KernelSU

    - name: Configure kernel
      run: |
        echo "CONFIG_ARM64=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KERNEL_IMAGE=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_HIDE_MOUNTS=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_DEBUG_INFO=n" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "# CONFIG_DEBUG_INFO is not set" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/g' arch/arm64/configs/ls12_mt8797_wifi_64_defconfig || true
        sed -i 's/CONFIG_CC_WERROR=y/CONFIG_CC_WERROR=n/g' arch/arm64/configs/ls12_mt8797_wifi_64_defconfig || true
        sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/g' arch/arm64/configs/ls12_mt8797_wifi_64_defconfig || true
        make ARCH=arm64 olddefconfig

    - name: Build kernel
      run: |
        export PATH=/usr/lib/llvm-14/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        make ARCH=arm64 ls12_mt8797_wifi_64_defconfig
        make -j$(nproc) ARCH=arm64 CC=clang Image CONFIG_DEBUG_INFO=n KCFLAGS=-Wno-error 2>&1 | grep -v "objdump: Warning" || make -j1 ARCH=arm64 CC=clang Image CONFIG_DEBUG_INFO=n KCFLAGS=-Wno-error 2>&1 | grep -v "objdump: Warning"

    - name: Package AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        IMAGE_PATH=$(find . -name "Image" -type f 2>/dev/null | head -1)
        if [ -z "$IMAGE_PATH" ]; then
          echo "Image not found!"
          exit 1
        fi
        cp "$IMAGE_PATH" AnyKernel3/Image
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cd AnyKernel3 && zip -r ../AnyKernel3-SukiSU-Ultra.zip *

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-SukiSU-Ultra
        path: AnyKernel3-SukiSU-Ultra.zip
