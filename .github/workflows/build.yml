stages:
  - build
  - release

build-kernel:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y build-essential bc bison flex libssl-dev libelf-dev device-tree-compiler cpio gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf git wget xz-utils python3 python3-pip
  script:
    - chmod +x build-mt8797.sh
    - ./build-mt8797.sh
    - mkdir -p artifacts/
    - cp -r out/* artifacts/ 2>/dev/null || true
    - cd artifacts
    - tar -czf kernel-${CI_COMMIT_SHORT_SHA}.tar.gz *
  artifacts:
    paths:
      - artifacts/kernel-${CI_COMMIT_SHORT_SHA}.tar.gz
    expire_in: 7 days

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-kernel
      artifacts: true
  script:
    - echo "Creating release..."
  release:
    tag_name: ${CI_COMMIT_SHORT_SHA}
    name: "Kernel MT8797 ${CI_COMMIT_SHORT_SHA}"
    description: "Kernel build for MT8797"
    assets:
      links:
        - name: "kernel-package"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/download"
          link_type: package
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
  when: manual